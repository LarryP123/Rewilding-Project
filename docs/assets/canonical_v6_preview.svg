<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Canonical v6 rewilding suitability preview</title>
  <desc id="desc">A stylised preview of the rewilding suitability explorer showing scenario controls, a map of candidate cells, and key canonical v6 findings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6efe3"/>
      <stop offset="55%" stop-color="#e7dec9"/>
      <stop offset="100%" stop-color="#cdd9c4"/>
    </linearGradient>
    <linearGradient id="map" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e8d99b"/>
      <stop offset="45%" stop-color="#8ca85d"/>
      <stop offset="100%" stop-color="#315f38"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#2f3d2f" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <circle cx="1020" cy="80" r="180" fill="#f0c46c" opacity="0.22"/>
  <circle cx="120" cy="620" r="220" fill="#315f38" opacity="0.11"/>

  <rect x="52" y="46" width="1096" height="588" rx="34" fill="#fffaf0" opacity="0.9" filter="url(#shadow)"/>
  <rect x="82" y="78" width="1036" height="84" rx="24" fill="#254734"/>
  <text x="112" y="116" fill="#f9f3e7" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Rewilding Opportunity Explorer</text>
  <text x="112" y="143" fill="#dfe7d8" font-family="Verdana, sans-serif" font-size="15">Canonical v6 screening model: stable core candidates plus scenario-led variants</text>

  <g transform="translate(82 190)">
    <rect width="276" height="382" rx="24" fill="#f7eedf" stroke="#d7c7aa"/>
    <text x="24" y="42" fill="#254734" font-family="Verdana, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">TRADEOFF LENS</text>
    <rect x="24" y="62" width="228" height="42" rx="16" fill="#315f38"/>
    <text x="44" y="89" fill="#fffaf0" font-family="Verdana, sans-serif" font-size="16" font-weight="700">Balanced</text>
    <rect x="24" y="116" width="228" height="42" rx="16" fill="#fffaf0" stroke="#d7c7aa"/>
    <text x="44" y="143" fill="#596454" font-family="Verdana, sans-serif" font-size="16">Nature-first</text>
    <rect x="24" y="170" width="228" height="42" rx="16" fill="#fffaf0" stroke="#d7c7aa"/>
    <text x="44" y="197" fill="#596454" font-family="Verdana, sans-serif" font-size="16">Low-conflict</text>

    <text x="24" y="252" fill="#254734" font-family="Verdana, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">CANONICAL V6</text>
    <text x="24" y="284" fill="#254734" font-family="Verdana, sans-serif" font-size="34" font-weight="700">204,703</text>
    <text x="24" y="310" fill="#596454" font-family="Verdana, sans-serif" font-size="15">1 km England cells scored</text>
    <text x="24" y="346" fill="#254734" font-family="Verdana, sans-serif" font-size="34" font-weight="700">36</text>
    <text x="24" y="372" fill="#596454" font-family="Verdana, sans-serif" font-size="15">top-100 cells shared by all scenarios</text>
  </g>

  <g transform="translate(390 190)">
    <rect width="430" height="382" rx="24" fill="#fffaf0" stroke="#d7c7aa"/>
    <path d="M191 24 C174 54 178 84 159 115 C138 150 121 181 129 220 C137 258 167 272 161 311 C157 339 179 357 214 352 C249 347 269 315 299 294 C335 269 350 234 330 198 C313 167 321 140 302 108 C279 69 228 54 191 24 Z" fill="url(#map)" opacity="0.88"/>
    <g fill="#f7e9ba" stroke="#254734" stroke-width="2" opacity="0.94">
      <polygon points="252,94 271,105 271,127 252,138 233,127 233,105"/>
      <polygon points="228,132 247,143 247,165 228,176 209,165 209,143"/>
      <polygon points="286,183 305,194 305,216 286,227 267,216 267,194"/>
      <polygon points="209,219 228,230 228,252 209,263 190,252 190,230"/>
      <polygon points="257,250 276,261 276,283 257,294 238,283 238,261"/>
      <polygon points="181,285 200,296 200,318 181,329 162,318 162,296"/>
    </g>
    <circle cx="253" cy="116" r="8" fill="#234b6b"/>
    <circle cx="228" cy="154" r="8" fill="#234b6b"/>
    <circle cx="286" cy="205" r="8" fill="#234b6b"/>
    <circle cx="209" cy="241" r="8" fill="#234b6b"/>
    <circle cx="257" cy="272" r="8" fill="#234b6b"/>
    <text x="28" y="42" fill="#254734" font-family="Verdana, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">MAP VIEW</text>
    <text x="28" y="354" fill="#596454" font-family="Verdana, sans-serif" font-size="15">Top cells and candidate zones are packaged into the standalone explorer.</text>
  </g>

  <g transform="translate(852 190)">
    <rect width="266" height="382" rx="24" fill="#f7eedf" stroke="#d7c7aa"/>
    <text x="24" y="42" fill="#254734" font-family="Verdana, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">KEY FINDINGS</text>
    <text x="24" y="84" fill="#254734" font-family="Verdana, sans-serif" font-size="22" font-weight="700">Core + variants</text>
    <text x="24" y="115" fill="#596454" font-family="Verdana, sans-serif" font-size="15">The model is strongest as a</text>
    <text x="24" y="137" fill="#596454" font-family="Verdana, sans-serif" font-size="15">decision aid, not a single</text>
    <text x="24" y="159" fill="#596454" font-family="Verdana, sans-serif" font-size="15">fixed ranking.</text>

    <rect x="24" y="197" width="218" height="54" rx="16" fill="#fffaf0"/>
    <text x="42" y="231" fill="#254734" font-family="Verdana, sans-serif" font-size="16" font-weight="700">11 candidate zones</text>
    <rect x="24" y="263" width="218" height="54" rx="16" fill="#fffaf0"/>
    <text x="42" y="297" fill="#254734" font-family="Verdana, sans-serif" font-size="16" font-weight="700">42% in top 3 zones</text>
    <rect x="24" y="329" width="218" height="34" rx="14" fill="#315f38"/>
    <text x="42" y="351" fill="#fffaf0" font-family="Verdana, sans-serif" font-size="13" font-weight="700">Dedicated flood + peat</text>
  </g>
</svg>
