# Canonical published result
# --------------------------
# The repository's current canonical published outputs (top-100 shortlist,
# candidate clusters, inspection maps, brief, and app) are expected to be
# rebuilt from the dedicated-data 1 km official-boundary score layer:
#   data/interim/mvp_official_boundary_1km_v6/hex_scores.parquet
#
# CORINE remains available as a local-development fallback for flood and peat
# scoring, but it is not part of the canonical published contract.

[[dataset]]
name = "alc_raw"
stage = "raw"
path = "data/raw/alc/ALC_Grades_(Provisional)___ADAS_&_Defra.shp"
description = "Primary Agricultural Land Classification shapefile used in the canonical published result."

[[dataset]]
name = "corine_raw"
stage = "raw"
path = "data/raw/corine/U2018_CLC2018_V2020_20u1.gpkg"
description = "CORINE 2018 geopackage used for habitat context and retained only as a local-development fallback for flood and peat."

[[dataset]]
name = "flood_raw_dedicated"
stage = "raw"
path = "data/raw/flood/ea_flood_zones.gpkg"
description = "Canonical dedicated flood dataset required for the published run."

[[dataset]]
name = "peat_raw_dedicated"
stage = "raw"
path = "data/raw/peat/england_peat_map.gdb"
description = "Canonical dedicated peat dataset required for the published run."

[[dataset]]
name = "england_boundary_analysis"
stage = "raw"
path = "data/raw/boundaries/england_boundary_analysis.parquet"
description = "Official England analysis boundary used by the canonical published 1 km result."

[[dataset]]
name = "lnrs_boundaries"
stage = "raw"
path = "data/raw/reference/lnrs_boundaries.geojson"
required = false
description = "Optional LNRS geography used for policy slicing and summary outputs."

[[dataset]]
name = "corine_subset"
stage = "interim"
path = "data/interim/corine_subset.parquet"
description = "Cached England-focused CORINE subset reused by the local pipeline."

[[dataset]]
name = "bird_observations_irecord_verified"
stage = "interim"
path = "data/interim/bird_observations_irecord_verified_2015plus_england.parquet"
required = false
description = "Cached bird observation layer reused by enriched local and canonical runs when present."

[[dataset]]
name = "alc_clean"
stage = "interim"
path = "data/interim/alc_clean.parquet"
description = "Cleaned and reprojected ALC cache reused by the canonical published result."

[[dataset]]
name = "flood_dedicated_clean"
stage = "interim"
path = "data/interim/flood_ea_flood_zones_simplified_clean.parquet"
description = "Stable cleaned flood artifact derived from the canonical simplified dedicated flood source."

[[dataset]]
name = "peat_dedicated_clean"
stage = "interim"
path = "data/interim/peat_england_peat_map_simplified_clean.parquet"
description = "Stable cleaned peat artifact derived from the canonical simplified dedicated peat source."

[[dataset]]
name = "official_result_boundary"
stage = "interim"
path = "data/interim/mvp_official_boundary_1km_v6/analysis_boundary.parquet"
description = "Canonical analysis boundary artifact for the published dedicated-data result."

[[dataset]]
name = "official_result_corine_subset"
stage = "interim"
path = "data/interim/mvp_official_boundary_1km_v6/corine_england_subset.parquet"
description = "Canonical CORINE subset artifact for habitat-context processing in the published dedicated-data result."

[[dataset]]
name = "official_result_habitat_proxy"
stage = "interim"
path = "data/interim/mvp_official_boundary_1km_v6/habitat_proxy.parquet"
description = "Canonical habitat proxy artifact for the published dedicated-data result."

[[dataset]]
name = "official_result_grid"
stage = "interim"
path = "data/interim/mvp_official_boundary_1km_v6/hex_grid.parquet"
description = "Canonical 1 km analysis grid for the published dedicated-data result."

[[dataset]]
name = "official_result_scores"
stage = "interim"
path = "data/interim/mvp_official_boundary_1km_v6/hex_scores.parquet"
description = "Canonical scored-grid artifact backing the repository's published outputs."

[[dataset]]
name = "official_result_run_metadata"
stage = "interim"
path = "data/interim/mvp_official_boundary_1km_v6/run_metadata.json"
description = "Canonical run metadata sidecar recording the active flood and peat source lineage."
